<!DOCTYPE html>
<html>
    <body>
        <div class="admission-form">
            <h2>Muscle Gym Member Registration </h2>
            <form>
                name:<input type="text" placeholder="Firstname "/>
                <input type="text " placeholder="Lastname"/><br/>
                <br/>
                phonenumber:<input type="tel"/><br/>
                <br/>
                Email:<input type="email"/><br/>
                <br/>
                Age:<input type="number"/><br/>
                <br/>
                Dte of birth:<input type="date"/><br/>
                <br/>
                Gender:
                <input type="radio"name="Gender"value="male"/>male
                <input type="radio"name="Gender"value="female"/>female
                <br/>
                Address:<textarea cols="30"rows="5"></textarea><br/>
                <br/>
                </form>
                <fieldset>
                    <legend>Membership detail</legend>
                    <input type="radio"name="Membership"value="gold"/>gold(gym+cardio)
                    <input type="radio" name="Membership"value="premium"/>(gym+ cardio+crossfit)<br/>
                    <br/>
                    duration:
                    <select >
                    <option value="1">1 month</option>
                    <option value="3">3 months</option>
                    <option value="6">6 months</option>
                    <option value="12">1 year</option>
                    </select><br/>
                    <br/>
                    Are you interested in any of the following
                    <br/>
                    <input type="checkbox"name="add- on"value="yoga"/>yoga
                    <input type="checkbox"name="add-on"value="free-pt"/>free PT Training
                    <input type="checkbox"name="add-on"value="zumba"/>zumba
                    <input type="checkbox"name="add-on"value="piloxing"/>piloxing
                    <input type="checkbox"name="add-on"value="diet"/>diet plan
                </fieldset>        
                </div>
                <form>
                    <button type="submit">submit</button><br/>
                    <br/>
                    <button type="reset">reset</button>
                    </form>
                    <a href="homepage.html">back</a>
                
        </div>
    </body>
</html>
